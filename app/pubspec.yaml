name: wedding_app
description: Aplicación de matrimonios tipo Teamsder con módulos de conexión, mesas, invitados y galería
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Estado y navegación
  provider: ^6.1.1
  go_router: ^13.0.0
  
  # HTTP y servicios
  http: ^1.1.2
  dio: ^5.4.0
  
  # UI y utilidades
  google_fonts: ^6.3.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  intl: ^0.18.1
  timezone: ^0.9.4
  
  # Utilidades
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
